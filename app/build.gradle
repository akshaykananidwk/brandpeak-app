plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
    id 'com.onesignal.androidsdk.onesignal-gradle-plugin'
}

android {
    signingConfigs {
        release {
            storeFile file('/Users/p21-0036/Downloads/BrandPeak_PlayStoreDetail/brandpeak.jks')
            storePassword 'Deep@237'
            keyPassword 'Deep@237'
            keyAlias 'brandpeak'
        }
    }
    compileSdk 35
    defaultConfig {
        applicationId "com.iqueen.brandpeak"
        minSdk 24
        targetSdk 35
        versionCode 39
        versionName "2.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        dataBinding true
    }

    applicationVariants.configureEach { variant ->
        variant.outputs.configureEach { output ->
            outputFileName = new File("BrandPeak-"+"V-"+ variant.versionName+".apk");
        }
        setProperty("archivesBaseName", "BrandPeak-$versionName-VC$versionCode")
    }




    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            // signingConfig signingConfigs.release
            //  signingConfig signingConfigs.release
        }

      /*  debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
            //  signingConfig signingConfigs.release
        }*/

    }




    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    lint {
        baseline = file("lint-baseline.xml")
        abortOnError false
        checkReleaseBuilds false
    }
    namespace 'com.iqueen.brandpeak'
}

dependencies {

    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])

    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
